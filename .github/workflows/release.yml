name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    name: Verify Windows release build
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup show

      - name: Install frontend dependencies
        run: npm ci

      - name: Check release metadata
        shell: pwsh
        run: npm run check:release -- -SkipArtifacts -SkipSmokeTest -RcReadiness

      - name: Build frontend
        run: npm run build

      - name: Check Rust
        working-directory: src-tauri
        run: cargo check

      - name: Build Tauri bundle
        run: npm run tauri-build

      - name: Assert no MSI or ZIP release assets are produced
        shell: pwsh
        run: |
          $blocked = @(Get-ChildItem -Path src-tauri\target\release\bundle -Recurse -File -Include *.msi,*.zip -ErrorAction SilentlyContinue)
          if ($blocked.Count -gt 0) {
            throw "Release workflow must not produce MSI/ZIP assets: $($blocked.Name -join ', ')"
          }
          Write-Host "[ok] Release workflow produced no MSI/ZIP assets"
